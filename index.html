<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SJRP Dark Chat | Drug Trust Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', 'Fira Code', monospace;
        }
        body {
            background: #000;
            color: #0f0;
            overflow-x: hidden;
        }
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.32;
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .login-panel {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #0f0;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
            backdrop-filter: blur(4px);
        }
        .login-panel h1 { font-size: 1.8rem; margin-bottom: 10px; letter-spacing: 2px; }
        .login-panel input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            border-radius: 4px;
            font-size: 1rem;
        }
        .login-panel button, .btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .login-panel button:hover, .btn:hover {
            background: #0c0;
            transform: translateY(-1px);
            box-shadow: 0 0 12px #0f0;
        }
        .public-link { margin-top: 20px; color: #0f0; text-decoration: none; border-bottom: 1px dashed #0f0; cursor: pointer; }
        .dashboard { display: none; }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
        }
        .nav-bar {
            background: #000000aa;
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #0f0;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .nav-bar a {
            color: #0f0;
            text-decoration: none;
            font-weight: bold;
            padding: 5px 10px;
            cursor: pointer;
        }
        .nav-bar a.active { background: #0f0; color: #000; border-radius: 4px; }

        /* Two‑column grid – original working layout */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 20px;
            backdrop-filter: blur(2px);
            transition: box-shadow 0.2s ease;
        }
        .card:hover {
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.2);
        }
        .card h3 {
            border-left: 4px solid #0f0;
            padding-left: 12px;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #333;
        }
        th { color: #0f0; }
        .timer-feed, .pending-timers, .verified-timers {
            max-height: 300px;
            overflow-y: auto;
            background: #0a0a0a;
            padding: 10px;
            font-size: 0.9rem;
        }
        .timer-item, .pending-item, .verified-item {
            border-left: 3px solid #0f0;
            padding: 5px 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .badge { background: #0f0; color: #000; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; }
        .rule-card { background: #111; margin-bottom: 15px; padding: 12px; border-radius: 6px; border-left: 3px solid #0f0; }
        .rule-card strong { color: #0f0; }
        button.small, .btn.small { 
            padding: 4px 10px; 
            font-size: 0.8rem; 
            margin: 2px; 
        }
        .status { color: #ff0; }
        footer { text-align: center; margin-top: 40px; font-size: 0.7rem; opacity: 0.7; }
        .message-area {
            max-height: 200px;
            overflow-y: auto;
            background: #0a0a0a;
            padding: 10px;
            margin-bottom: 10px;
        }
        .week-highlight { background: #0f0; color: #000; padding: 2px 6px; border-radius: 4px; }
        .host-section { border: 2px solid #ff0; background: #111111cc; }
        .custom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
        }
        .custom-modal-content {
            background: #111;
            border: 2px solid #0f0;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            border-radius: 12px;
            animation: modalFade 0.2s ease-out;
        }
        @keyframes modalFade {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .custom-modal-content input, .custom-modal-content select, .custom-modal-content textarea {
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px;
            width: 100%;
            margin: 10px 0;
        }
        .close-modal-btn { float: right; cursor: pointer; margin-left: 10px; font-size: 28px; line-height: 1; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .death-screen {
            text-align: center;
            padding: 40px;
            background: rgba(0,0,0,0.9);
            border: 2px solid #f00;
            border-radius: 12px;
            margin: 20px;
        }
        .bracket-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 20px;
        }
        .round {
            flex: 1;
            min-width: 200px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 10px;
        }
        .match {
            border-bottom: 1px solid #333;
            padding: 8px;
            margin: 5px 0;
        }
        .match.winner { background: #0f0; color: #000; }
        .match button { background: #0f0; color: #000; border: none; padding: 2px 6px; margin-left: 5px; cursor: pointer; }

        /* Toast notification */
        .toast-notification {
            position: fixed;
            top: 24px;
            right: 24px;
            background: #111;
            border: 2px solid #0f0;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            display: none;
            max-width: 380px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            font-family: monospace;
        }
        .toast-notification.error {
            border-color: #f00;
            color: #f77;
        }
        .toast-notification.show {
            display: block;
            animation: slideIn 0.25s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 800px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<canvas id="matrix-bg"></canvas>
<div class="container">
    <div id="loginPanel" class="login-panel">
        <h1>&gt; SJRP_DARK_CHAT</h1>
        <div style="font-size:0.9rem; margin:10px 0;">Access restricted to whitelisted personnel</div>
        <input type="text" id="username" placeholder="Login ID" autocomplete="off">
        <input type="password" id="password" placeholder="Passphrase">
        <button type="button" id="loginBtn">AUTHENTICATE</button>
        <div id="loginStatus" style="margin-top:10px; font-size:0.8rem;"></div>
        <div style="margin-top: 15px;">
            <span id="publicWarRoomLink" class="public-link">[ VIEW PUBLIC WAR ROOM ]</span>
        </div>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="nav-bar" id="navBar"></div>
        <div class="dashboard-header">
            <div><span style="font-size:1.5rem;">&gt; SJRP DRUG TRUST PORTAL</span> <span class="badge" id="userRoleBadge"></span></div>
            <button type="button" id="logoutBtn" class="small">LOGOUT</button>
        </div>
        <div id="dashboardContent"></div>
    </div>

    <div id="publicWarRoom" style="display:none;">
        <div class="dashboard-header">
            <div><span style="font-size:1.5rem;">&gt; PUBLIC WAR ROOM (Read‑Only)</span></div>
            <button type="button" id="backToLoginFromPublic" class="small">← Back to Login</button>
        </div>
        <div class="grid-2">
            <div class="card"><h3>🏆 STANDINGS (All Gangs)</h3>
                <table id="publicStandings">
                    <thead><tr><th>Rank</th><th>Gang</th><th>Points</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="card"><h3>⏲️ ACTIVE TIMERS</h3><div id="publicTimerFeed" class="timer-feed"></div></div>
        </div>
        <div class="card"><h3>🤝 ALLIANCES</h3><div id="publicAlliances"></div></div>
        <div class="card"><h3>🏆 TOURNAMENT BRACKET</h3><div id="publicBracket"></div></div>
        <div class="card"><h3>📅 WAR CALENDAR</h3><div id="publicCalendar"></div></div>
        <footer>Data refreshes automatically.</footer>
    </div>
</div>

<div id="customModal" class="custom-modal">
    <div class="custom-modal-content">
        <span class="close-modal-btn" id="modalCloseBtn">&times;</span>
        <div id="modalBody"></div>
        <div style="text-align:right; margin-top:10px;">
            <button type="button" id="modalConfirmBtn" class="small">Confirm</button>
            <button type="button" id="modalCancelBtn" class="small">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const API_URL = "https://script.google.com/macros/s/AKfycbzNzE4aO3XdkJFznxCMTzdOiARHhTRmUv4pBXEt6j9SsUtG6PYS72iLq2RpHzj-KhvH/exec";
    const FETCH_TIMEOUT = 15000;

    const roleMap = {
        "admin": "admin",
        "gang leader": "leader",
        "shotcaller": "shotcaller",
        "pd informant": "informant",
        "pd chief": "pdchief"
    };

    const DEFAULT_GANGS = [
        "Fallen Angels", "Phantom Rose", "99OTF", "Noctis", "Vipers Curse",
        "Anbu Mafia", "Black Lotus MC", "Trash Bandits", "Grims Anarchy MC", "Lost MC", "Misfits"
    ];

    let gangs = [...DEFAULT_GANGS];
    let gangData = {};
    let activeTimers = [];
    let verifiedTimers = [];
    let timerIdCounter = 1;
    let warActive = false;
    let currentWeek = 1;
    let currentHost = null;
    let signatures = [];
    let cookoutEntrants = [];
    let shotCallers = {};
    let informants = [];
    let pdPresence = {};
    let armsDeals = [];
    let messages = [];
    let hostSubmission = null;
    let tournamentBracket = null;

    let currentUser = null;
    let currentPage = "dashboard";

    // ==================== TOAST NOTIFICATION ====================
    function showNotification(msg, isError=false) {
        let notif = document.getElementById("toast-notification");
        if (!notif) {
            notif = document.createElement("div");
            notif.id = "toast-notification";
            notif.className = "toast-notification";
            document.body.appendChild(notif);
        }
        notif.textContent = msg;
        notif.className = `toast-notification ${isError ? 'error' : ''} show`;
        setTimeout(() => {
            notif.classList.remove('show');
        }, 4000);
    }

    // ==================== AUDIT LOGGING ====================
    async function logAudit(action, details = {}) {
        if (!currentUser) return;
        const payload = {
            action: "logAction",
            user: { username: currentUser.username, role: currentUser.role, gang: currentUser.gang },
            data: {
                timestamp: new Date().toISOString(),
                role: currentUser.role,
                username: currentUser.username,
                action: action,
                details: JSON.stringify(details)
            }
        };
        try {
            await fetchWithTimeout(API_URL, { method: "POST", body: JSON.stringify(payload) });
        } catch (err) {
            console.error("Audit log failed:", err);
        }
    }

    async function createLoginEntry(username, passcode, role, gang = "") {
        const payload = {
            action: "createLogin",
            data: {
                username: username,
                passcode: passcode,
                role: role,
                gang: gang
            }
        };
        try {
            const res = await fetchWithTimeout(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            if (!result.success) console.error("Login creation failed:", result.error);
            return result.success;
        } catch (err) {
            console.error("Network error creating login:", err);
            return false;
        }
    }

    async function fetchWithTimeout(url, options, timeout = FETCH_TIMEOUT) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
        } catch (error) {
            clearTimeout(id);
            throw error;
        }
    }

    async function saveDataToBackend() {
        if (!currentUser) return;
        const payload = {
            action: "saveData",
            user: { username: currentUser.username, role: currentUser.role, gang: currentUser.gang },
            data: {
                gangData,
                activeTimers: activeTimers.map(t => ({ ...t, intervalId: null })),
                verifiedTimers,
                timerIdCounter,
                warActive,
                currentWeek,
                currentHost,
                signatures,
                cookoutEntrants,
                shotCallers,
                informants,
                pdPresence,
                armsDeals,
                messages,
                hostSubmission,
                tournamentBracket
            }
        };
        try {
            const res = await fetchWithTimeout(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            if (!result.success) {
                console.error("Save failed:", result.error);
                showNotification("Failed to save data. Some changes may be lost.", true);
            }
        } catch (err) {
            console.error("Network error saving:", err);
            showNotification("Network error - data not saved.", true);
        }
    }

    function clearAllTimerIntervals() {
        activeTimers.forEach(t => {
            if (t.intervalId) {
                clearTimeout(t.intervalId);
                t.intervalId = null;
            }
        });
    }

    async function loadFullData() {
        if (!currentUser) return false;
        const payload = {
            action: "getFullData",
            user: { username: currentUser.username, role: currentUser.role }
        };
        try {
            const res = await fetchWithTimeout(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.success && result.data) {
                const data = result.data;
                gangData = data.gangData || {};
                const backendGangs = Object.keys(gangData).sort();
                gangs = backendGangs.length ? backendGangs : DEFAULT_GANGS;
                gangs.forEach(g => {
                    if (!gangData[g]) gangData[g] = { points: 0, flips: 0, losses: 0, rank: null, shotCallers: [], size: 0, alliances: [], lastKillDate: null, lastKidnapDate: null };
                });

                clearAllTimerIntervals();

                activeTimers = (data.activeTimers || []).map(t => ({ ...t, intervalId: null, stopped: false }));
                verifiedTimers = data.verifiedTimers || [];
                timerIdCounter = data.timerIdCounter || 1;
                warActive = data.warActive || false;
                currentWeek = data.currentWeek || 1;
                currentHost = data.currentHost || null;
                signatures = data.signatures || [];
                cookoutEntrants = data.cookoutEntrants || [];
                informants = data.informants || [];
                pdPresence = data.pdPresence || {};
                armsDeals = data.armsDeals || [];
                messages = data.messages || [];
                hostSubmission = data.hostSubmission || null;
                tournamentBracket = data.tournamentBracket || null;
                shotCallers = data.shotCallers || {};
                for (let gang in shotCallers) {
                    if (!shotCallers[gang]) shotCallers[gang] = [];
                }

                updateRankings();

                const now = Date.now();
                activeTimers = activeTimers.filter(t => {
                    if (t.stopped) return false;
                    if (t.endTime > now) {
                        const remaining = t.endTime - now;
                        t.intervalId = setTimeout(() => timerExpired(t), remaining);
                        return true;
                    } else {
                        timerExpired(t);
                        return false;
                    }
                });
                refreshAllViews();
                return true;
            } else {
                throw new Error(result.error || "Invalid data structure");
            }
        } catch (err) {
            console.error("Failed to load data:", err);
            showNotification("Failed to load data from server. Using local backup.", true);
            loadLocalData();
            return false;
        }
    }

    function timerExpired(timer) {
        if (timer.stopped) return;
        let attackers = timer.attackers || [timer.attacker];
        let totalPoints = 1;
        if (pdPresence[timer.defender]) totalPoints -= 0.25;
        let pointsPerAttacker = calculatePointsForAlliance(attackers, totalPoints);
        attackers.forEach((att, idx) => {
            addPoints(att, pointsPerAttacker[idx]);
        });
        if (gangs.includes(timer.defender)) {
            addPoints(timer.defender, -1);
        }
        attackers.forEach(att => {
            if (gangData[att]) gangData[att].flips++;
        });
        saveDataToBackend();
        refreshAllViews();
        showNotification(`${attackers.join(", ")} FLIPPED ${timer.defender}! +${pointsPerAttacker[0]} point(s) each.`);
        logAudit("timer_expired", { attackers, defender: timer.defender, points: pointsPerAttacker });
    }

    function calculatePointsForAlliance(gangsList, totalPoints) {
        let totalWeight = 0;
        let weights = gangsList.map(g => {
            let size = gangData[g]?.size || 0;
            if (size >= 3 && size <= 8) return 1;
            if (size >= 9 && size <= 15) return 0.5;
            if (size >= 16) return 0.25;
            return 0;
        });
        totalWeight = weights.reduce((a,b) => a+b, 0);
        if (totalWeight === 0) return gangsList.map(() => totalPoints / gangsList.length);
        return weights.map(w => (w / totalWeight) * totalPoints);
    }

    function loadLocalData() {
        let saved = localStorage.getItem("sjrp_dtt");
        if(saved) {
            let data = JSON.parse(saved);
            gangData = data.gangData || {};
            gangs = Object.keys(gangData).length ? Object.keys(gangData).sort() : DEFAULT_GANGS;
            activeTimers = data.activeTimers || [];
            verifiedTimers = data.verifiedTimers || [];
            timerIdCounter = data.timerIdCounter || 1;
            warActive = data.warActive || false;
            currentWeek = data.currentWeek || 1;
            currentHost = data.currentHost || null;
            signatures = data.signatures || [];
            cookoutEntrants = data.cookoutEntrants || [];
            shotCallers = data.shotCallers || {};
            informants = data.informants || [];
            pdPresence = data.pdPresence || {};
            armsDeals = data.armsDeals || [];
            messages = data.messages || [];
            hostSubmission = data.hostSubmission || null;
            tournamentBracket = data.tournamentBracket || null;
        }
        gangs.forEach(g => {
            if(!gangData[g]) gangData[g] = { points: 0, flips: 0, losses: 0, rank: null, shotCallers: [], size: 0, alliances: [], lastKillDate: null, lastKidnapDate: null };
        });
        updateRankings();
        refreshAllViews();
    }

    function saveLocalData() {
        let data = {
            gangData, activeTimers: activeTimers.map(t => ({ ...t, intervalId: null })), verifiedTimers, timerIdCounter, warActive, currentWeek, currentHost,
            signatures, cookoutEntrants, shotCallers, informants, pdPresence,
            armsDeals, messages, hostSubmission, tournamentBracket
        };
        localStorage.setItem("sjrp_dtt", JSON.stringify(data));
    }

    function updateRankings() {
        let sorted = gangs.map(g => ({ name: g, points: gangData[g].points })).sort((a,b)=>b.points - a.points);
        gangs.forEach(g => {
            let rank = sorted.findIndex(s => s.name === g) + 1;
            gangData[g].rank = rank;
        });
    }

    function addPoints(gang, delta) {
        if (!gangData[gang]) {
            console.warn(`Attempted to add points to unknown gang: ${gang}`);
            return;
        }
        gangData[gang].points += delta;
        updateRankings();
        saveDataToBackend();
        showNotification(`${gang} ${delta>=0 ? 'gained' : 'lost'} ${Math.abs(delta)} point${Math.abs(delta)!==1?'s':''}.`);
        logAudit("points_changed", { gang, delta, newTotal: gangData[gang].points });
    }

    function createTimer(attacker, defender, isUndefended=false, alliedAttackers=[]) {
        if(!warActive) { showNotification("War window not active.", true); return null; }
        if(informants.every(i => i.killed || i.kidnapped || !i.active)) { showNotification("All informants unavailable. Timers paused.", true); return null; }
        let duration = isUndefended ? 3 : 5;
        let startTime = Date.now();
        let endTime = startTime + duration * 60 * 1000;
        let attackers = [attacker, ...alliedAttackers];
        let timer = {
            id: timerIdCounter++,
            attackers: attackers,
            attacker: attacker,
            defender,
            startTime, endTime,
            isUndefended,
            stopped: false,
            intervalId: null
        };
        activeTimers.push(timer);
        timer.intervalId = setTimeout(() => timerExpired(timer), duration * 60 * 1000);
        saveDataToBackend();
        refreshAllViews();
        logAudit("timer_started", { attacker, defenders: attackers, defender, duration });
        return timer;
    }

    function stopTimer(timerId, defender) {
        let timer = activeTimers.find(t => t.id === timerId);
        if(timer && !timer.stopped) {
            timer.stopped = true;
            if(timer.intervalId) clearTimeout(timer.intervalId);
            activeTimers = activeTimers.filter(t => t.id !== timerId);
            saveDataToBackend();
            refreshAllViews();
            showNotification(`${defender} secured their block. Timer stopped.`);
            logAudit("timer_stopped", { timerId, defender });
        }
    }

    function pauseAllTimers() {
        activeTimers.forEach(t => { if(t.intervalId) clearTimeout(t.intervalId); });
        activeTimers = [];
        saveDataToBackend();
        refreshAllViews();
    }

    function startWarWindow(code) {
        if(code === "DTRUST2026") {
            warActive = true;
            saveDataToBackend();
            showNotification("War window activated.");
            refreshAllViews();
            logAudit("war_started", { by: currentUser?.username });
        } else { showNotification("Invalid code.", true); }
    }

    function stopWarWindow() { warActive = false; pauseAllTimers(); saveDataToBackend(); refreshAllViews(); logAudit("war_stopped", { by: currentUser?.username }); }

    function createArmsDeal(gang, type, items, location, clues) {

    function renderBracketHTML(bracket) {
        if (!bracket || !bracket.rounds) return "<p>No tournament bracket defined.</p>";
        let html = '<div class="bracket-container">';
        bracket.rounds.forEach((round, idx) => {
            html += `<div class="round"><h4>${idx === 0 ? 'Quarterfinals' : idx === 1 ? 'Semifinals' : 'Finals'}</h4>`;
            round.forEach(match => {
                let winnerClass = match.winner ? 'winner' : '';
                html += `<div class="match ${winnerClass}">
                            ${match.gang1} vs ${match.gang2}<br>
                            ${match.winner ? `Winner: ${match.winner}` : 'TBD'}
                         </div>`;
            });
            html += `</div>`;
        });
        html += '</div>';
        return html;
    }

    function refreshAllViews() {
        if(document.getElementById("dashboardContent")) {

            }
        }
        renderPublicWarRoom();
        const today = new Date().toDateString();
        messages = messages.filter(m => new Date(m.timestamp).toDateString() === today);
        saveDataToBackend();
    }

        function renderTournamentAdmin() {
            let container = document.getElementById("tournamentBracketAdmin");
            if(!tournamentBracket || !tournamentBracket.rounds) { container.innerHTML = "<p>No tournament bracket. Generate one or edit manually.</p>"; return; }
            let html = '<div class="bracket-container">';
            tournamentBracket.rounds.forEach((round, rIdx) => {
                html += `<div class="round"><h4>${rIdx === 0 ? 'Quarterfinals' : rIdx === 1 ? 'Semifinals' : 'Finals'}</h4>`;
                round.forEach((match, mIdx) => {
                    let winnerClass = match.winner ? 'winner' : '';
                    html += `<div class="match ${winnerClass}">${match.gang1} vs ${match.gang2}<br>${match.winner ? `Winner: ${match.winner}` : 'TBD'}${!match.winner ? `<button type="button" class="small setWinner" data-round="${rIdx}" data-match="${mIdx}">Set Winner</button>` : ''}</div>`;
                });
                html += `</div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            document.querySelectorAll("#tournamentBracketAdmin .setWinner").forEach(btn => {
                btn.onclick = () => {
                    let round = parseInt(btn.dataset.round), match = parseInt(btn.dataset.match);
                    let matchObj = tournamentBracket.rounds[round][match];
                    showModal("Set Winner", `<select id="winnerSelect"><option value="${matchObj.gang1}">${matchObj.gang1}</option><option value="${matchObj.gang2}">${matchObj.gang2}</option></select>`, () => {
                        let winner = document.getElementById("winnerSelect").value;
                        matchObj.winner = winner;
                        if (round === 0) {
                            let nextRoundIdx = Math.floor(match / 2);
                            let nextMatch = tournamentBracket.rounds[1][nextRoundIdx];
                            if (!nextMatch.gang1) nextMatch.gang1 = winner;
                            else if (!nextMatch.gang2) nextMatch.gang2 = winner;
                        } else if (round === 1) {
                            let finalMatch = tournamentBracket.rounds[2][0];
                            if (!finalMatch.gang1) finalMatch.gang1 = winner;
                            else if (!finalMatch.gang2) finalMatch.gang2 = winner;
                        }
                        saveDataToBackend(); refreshAllViews(); renderTournamentAdmin(); logAudit("tournament_winner_set", { round, match, winner });
                    });
                };
            });
        }

                let div = document.createElement("div");
                div.className = "pending-item";

                let seconds = remaining % 60;
                let attackers = t.attackers ? t.attackers.join(", ") : t.attacker;
                div.innerHTML = `<span><strong>${attackers}</strong> pushing <strong>${t.defender}</strong> (${t.isUndefended ? "3min" : "5min"}) - ${minutes}:${seconds<10?'0'+seconds:seconds}</span>

            document.querySelectorAll(".confirmTimer").forEach(btn => {
                btn.onclick = () => {

                        verifiedTimers.push({

            let container = document.getElementById("verifiedTimersList");
            if(container) {
                container.innerHTML = verifiedTimers.map(vt => `<div class="verified-item">${vt.attacker} flipped ${vt.defender} - verified by ${vt.verifiedBy} at ${new Date(vt.timestamp).toLocaleTimeString()}</div>`).join("");
                if(verifiedTimers.length===0) container.innerHTML = "<div>No verified timers</div>";
            }
        }
        renderTimerList();
        renderVerifiedTimers();
        setInterval(() => { renderTimerList(); renderVerifiedTimers(); }, 5000);

        // Event delegation for informant buttons
        div.addEventListener('click', function(e) {
            const target = e.target;
            
            if (target.id === 'verifyLocationBtn') {
                showModal("Verify Location", '<input id="postal" placeholder="Postal Code"><textarea id="desc" placeholder="Description of surroundings"></textarea>', () => {
                    let postal = document.getElementById("postal").value.trim();
                    let desc = document.getElementById("desc").value.trim();
                    if(postal && desc) {
                        myInfo.locationVerified = true;
                        myInfo.active = true;
                        myInfo.locationPostal = postal;
                        myInfo.locationDesc = desc;
                        saveDataToBackend();
                        showNotification("Location verified. You are now active.");
                        refreshAllViews();
                        logAudit("informant_location_verified", { informant: currentUser.username, postal, desc });
                    } else showNotification("Both postal and description required.", true);
                });
            }
            else if (target.id === 'reportKilledBtn') {
                let gangOptions = gangs.map(g => `<option>${g}</option>`).join("");
                showModal("Report Killed", `
                    <p>Which gang killed you?</p>
                    <select id="killerGang">${gangOptions}</select>
                `, () => {
                    let killerGang = document.getElementById("killerGang").value;
                    addPoints(killerGang, 3);
                    myInfo.killed = true;
                    myInfo.active = false;
                    pauseAllTimers();
                    saveDataToBackend();
                    showNotification(`You have been killed by ${killerGang}. Timers paused for 10 minutes. Admin notified.`);
                    refreshAllViews();
                    logAudit("informant_killed_by_gang", { informant: currentUser.username, killer: killerGang });
                });
            }
            else if (target.id === 'reportKidnappedBtn') {
                let gangOptions = gangs.map(g => `<option>${g}</option>`).join("");
                showModal("Report Kidnapped", `
                    <p>Which gang kidnapped you?</p>
                    <select id="kidnapperGang">${gangOptions}</select>
                `, () => {
                    let kidnapperGang = document.getElementById("kidnapperGang").value;
                    addPoints(kidnapperGang, 1);
                    myInfo.kidnapped = true;
                    myInfo.active = false;
                    pauseAllTimers();
                    saveDataToBackend();
                    showNotification(`You have been kidnapped by ${kidnapperGang}. Timers paused for 15 minutes.`);
                    refreshAllViews();
                    logAudit("informant_kidnapped_by_gang", { informant: currentUser.username, kidnapper: kidnapperGang });
                });
            }
            else if (target.id === 'markDefendedBtn') {
                let options = gangs.map(g => `<option>${g}</option>`).join("");
                showModal("Mark Block Defended", `<select id="defGang">${options}</select>`, () => {
                    let defender = document.getElementById("defGang").value;
                    let timer = activeTimers.find(t => t.defender === defender);
                    if(timer) stopTimer(timer.id, defender);
                    else showNotification("No active timer on that block.", true);
                });
            }
            else if (target.id === 'markUndefendedBtn') {
                let options = gangs.map(g => `<option>${g}</option>`).join("");
                showModal("Mark Block Undefended", `<select id="undefGang">${options}</select>`, () => {
                    let defender = document.getElementById("undefGang").value;
                    let timer = activeTimers.find(t => t.defender === defender);
                    if(timer && !timer.isUndefended) {
                        clearTimeout(timer.intervalId);
                        let newEnd = Date.now() + 3*60*1000;
                        timer.endTime = newEnd;
                        timer.isUndefended = true;
                        timer.intervalId = setTimeout(() => timerExpired(timer), 3*60*1000);
                        saveDataToBackend();
                        refreshAllViews();
                        showNotification(`Timer for ${defender} reduced to 3 minutes.`);
                        logAudit("timer_undefended_by_informant", { defender });
                    } else if(timer && timer.isUndefended) {
                        showNotification("Timer already undefended.", true);
                    } else showNotification("No active timer on that block.", true);
                });
            }
            else if (target.id === 'sendIntelBtn') {
                showModal("Send Intel to PD Chief", '<textarea id="intelText" rows="3" placeholder="Your intel"></textarea>', () => {
                    let intel = document.getElementById("intelText").value.trim();
                    if(intel) {
                        messages.push({ fromRole: "informant", fromName: currentUser.username, toRole: "pdchief", toName: null, text: intel, timestamp: new Date().toLocaleString() });
                        saveDataToBackend();
                        showNotification("Intel sent to PD Chief.");
                        renderMessages();
                        logAudit("intel_sent", { informant: currentUser.username, intel });
                        closeModal();
                    } else showNotification("Enter intel first.", true);
                });
            }
        });

        function renderMessages() {
            let container = document.getElementById("pdMessages");
            if(container) {
                let pdMsgs = messages.filter(m => (m.toRole === "informant" && m.toName === currentUser.username) || (m.fromRole === "informant" && m.fromName === currentUser.username) || (m.toRole === "pdchief" && m.fromRole === "informant"));
                container.innerHTML = pdMsgs.map(m => `<div><strong>${m.fromName} (${m.fromRole}):</strong> ${m.text}<br><small>${m.timestamp}</small></div>`).join("");
            }
        }
        renderMessages();
    }

    // ==================== PD CHIEF RENDER ====================
    function renderPdChief(div) {
        div.innerHTML = `
            <div class="grid-2">
                <div class="card">
                    <h3>🏆 Standings</h3>
                    <table id="chiefStandings">
                        <thead><tr><th>Rank</th><th>Gang</th><th>Points</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="card">
                    <h3>⏲️ Active Timers</h3>
                    <div id="chiefTimerFeed" class="timer-feed"></div>
                </div>
            </div>
            <div class="card">
                <h3>✅ Verified Timers</h3>
                <div id="chiefVerifiedTimers" class="verified-timers"></div>
            </div>
            <div class="card">
                <h3>🔫 Chief of Police Controls</h3>
                <div><strong>Informants:</strong></div>
                <div id="chiefInformantsList"></div>
                <button type="button" id="assignInformantBtn" class="small">Assign New Informant</button>
                <button type="button" id="overrideTimerBtn" class="small">Override Timer (Force Flip/Stop)</button>
                <div><strong>Arms Deal Intel:</strong> <button type="button" id="viewDealsBtn">View Deals</button></div>
                <div id="chiefDealList"></div>
            </div>
            <div class="card">
                <h3>💬 Communication</h3>
                <div id="pdMessagesChief" class="message-area"></div>
                <button type="button" id="sendToInformantBtn" class="small">Send to Informant</button>
            </div>
        `;

        // Standings table
        let tbody = document.querySelector("#chiefStandings tbody");
        gangs.sort((a,b) => (gangData[a].rank || 999) - (gangData[b].rank || 999)).forEach(g => {
            let row = tbody.insertRow();
            row.insertCell(0).innerText = gangData[g].rank || "—";
            row.insertCell(1).innerText = g;
            row.insertCell(2).innerText = gangData[g].points;
        });

        function updateChiefTimerFeed() {
            let feed = document.getElementById("chiefTimerFeed");
            if(feed) {
                feed.innerHTML = "";
                activeTimers.forEach(t => {
                    let remaining = Math.max(0, Math.ceil((t.endTime - Date.now())/1000));
                    let minutes = Math.floor(remaining/60);
                    let seconds = remaining % 60;
                    let attackers = t.attackers ? t.attackers.join(", ") : t.attacker;
                    feed.innerHTML += `<div class="timer-item">${attackers} → ${t.defender} - ${minutes}:${seconds<10?'0'+seconds:seconds}</div>`;
                });
                if(activeTimers.length===0) feed.innerHTML = "<div>No active timers</div>";
            }
        }
        updateChiefTimerFeed();
        setInterval(updateChiefTimerFeed, 1000);

        function updateChiefVerifiedTimers() {
            let container = document.getElementById("chiefVerifiedTimers");
            if(container) {
                container.innerHTML = verifiedTimers.map(vt => `<div class="verified-item">${vt.attacker} flipped ${vt.defender} - verified by ${vt.verifiedBy} at ${new Date(vt.timestamp).toLocaleTimeString()}</div>`).join("");
                if(verifiedTimers.length===0) container.innerHTML = "<div>No verified timers</div>";
            }
        }
        updateChiefVerifiedTimers();
        setInterval(updateChiefVerifiedTimers, 5000);

        function renderInformants() {
            let container = document.getElementById("chiefInformantsList");
            container.innerHTML = "";
            informants.forEach((inf, idx) => {
                let div = document.createElement("div");
                div.style.border = "1px solid #0f0";
                div.style.margin = "5px";
                div.style.padding = "5px";
                div.innerHTML = `
                    <strong>Informant ${idx+1}:</strong> ${inf.currentId || "Not assigned"}<br>
                    Status: ${inf.active ? "Active" : "Inactive"} | Killed: ${inf.killed ? "Yes" : "No"} | Kidnapped: ${inf.kidnapped ? "Yes" : "No"}<br>
                    Location: ${inf.locationPostal ? `Postal ${inf.locationPostal} - ${inf.locationDesc}` : "Not set"}
                `;
                container.appendChild(div);
            });
        }
        renderInformants();

        // Event delegation for PD Chief buttons
        div.addEventListener('click', function(e) {
            const target = e.target;
            
            if (target.id === 'assignInformantBtn') {
                let options = informants.map((inf, idx) => `<option value="${idx}">Informant ${idx+1} (${inf.currentId || "empty"})</option>`).join("");
                showModal("Assign Informant", `
                    <select id="infIdx">${options}</select>
                    <input id="newInfId" placeholder="Character Name">
                `, () => {
                    let idx = parseInt(document.getElementById("infIdx").value);
                    let newId = document.getElementById("newInfId").value.trim();
                    if(newId) {
                        informants[idx].currentId = newId;
                        informants[idx].active = true;
                        informants[idx].killed = false;
                        informants[idx].kidnapped = false;
                        informants[idx].locationVerified = false;
                        informants[idx].locationPostal = null;
                        informants[idx].locationDesc = null;
                        saveDataToBackend();
                        let passcode = Math.random().toString(36).substring(2,8).toUpperCase();
                        createLoginEntry(newId, passcode, "informant", "");
                        showNotification(`Informant assigned: ${newId} (passcode: ${passcode})`);
                        renderInformants();
                        logAudit("informant_assigned", { informant: newId, passcode });
                    } else showNotification("ID required.", true);
                });
            }
            else if (target.id === 'overrideTimerBtn') {
                showModal("Override Timer", `
                    <input id="timerId" type="number" placeholder="Timer ID">
                    <select id="actionSelect"><option value="flip">Force Flip (award point)</option><option value="stop">Stop Timer</option></select>
                `, () => {
                    let timerId = parseInt(document.getElementById("timerId").value);
                    let action = document.getElementById("actionSelect").value;
                    let timer = activeTimers.find(t => t.id === timerId);
                    if(timer) {
                        if(action === "flip") {
                            clearTimeout(timer.intervalId);
                            let idx = activeTimers.findIndex(t => t.id === timer.id);
                            if(idx !== -1) activeTimers.splice(idx,1);
                            addPoints(timer.attacker, 1);
                            if(timer.defender === gangs.find(g=>g===timer.defender)) addPoints(timer.defender, -1);
                            saveDataToBackend();
                            refreshAllViews();
                            showNotification(`Override: ${timer.attacker} flipped ${timer.defender}`);
                            logAudit("timer_override_flip", { timer: timerId, attacker: timer.attacker, defender: timer.defender });
                        } else if(action === "stop") {
                            stopTimer(timer.id, timer.defender);
                            logAudit("timer_override_stop", { timer: timerId, defender: timer.defender });
                        }
                    } else showNotification("Timer not found.", true);
                });
            }
            else if (target.id === 'viewDealsBtn') {
                let listDiv = document.getElementById("chiefDealList");
                if(armsDeals.length) listDiv.innerHTML = armsDeals.map(d => `<div><strong>${d.gang}</strong> - ${d.type}<br>Items: ${d.items}<br>Location: ${d.location}<br>Clues: ${d.clues.join(", ")}</div>`).join("<hr>");
                else listDiv.innerHTML = "<div>No deals available.</div>";
            }
            else if (target.id === 'sendToInformantBtn') {
                let informantOptions = informants.filter(i => i.currentId).map(i => `<option>${i.currentId}</option>`).join("");
                showModal("Send to Informant", `
                    <select id="targetInformant">${informantOptions}</select>
                    <textarea id="chiefMsg" rows="3" placeholder="Your message"></textarea>
                `, () => {
                    let target = document.getElementById("targetInformant").value;
                    let msg = document.getElementById("chiefMsg").value.trim();
                    if(msg) {
                        messages.push({
                            fromRole: "pdchief",
                            fromName: currentUser.username,
                            toRole: "informant",
                            toName: target,
                            text: msg,
                            timestamp: new Date().toLocaleString()
                        });
                        saveDataToBackend();
                        renderMessages();
                        showNotification("Message sent.");
                        logAudit("message_sent", { from: currentUser.username, to: target, text: msg });
                        closeModal();
                    } else showNotification("Enter message.", true);
                });
            }
        });

        function renderMessages() {
            let container = document.getElementById("pdMessagesChief");
            let chiefMsgs = messages.filter(m => (m.toRole === "pdchief" && m.toName === currentUser.username) || (m.fromRole === "pdchief" && m.fromName === currentUser.username) || (m.toRole === "informant" && m.fromRole === "pdchief"));
            container.innerHTML = chiefMsgs.map(m => `<div><strong>${m.fromName} (${m.fromRole}):</strong> ${m.text}<br><small>${m.timestamp}</small></div>`).join("");
        }
        renderMessages();
    }

    // ==================== DASHBOARD DISPATCH ====================
    function renderDashboardByRole() {
        if(!currentUser) return;
        const contentDiv = document.getElementById("dashboardContent");
        if(currentUser.role === "admin") renderAdmin(contentDiv);
        else if(currentUser.role === "leader") renderLeader(contentDiv);
        else if(currentUser.role === "shotcaller") renderShotCaller(contentDiv);
        else if(currentUser.role === "informant") renderInformant(contentDiv);
        else if(currentUser.role === "pdchief") renderPdChief(contentDiv);
        else contentDiv.innerHTML = `<div class="card"><h3>Unknown Role</h3><p>Role not recognized.</p></div>`;
    }

    function setPage(pageId) {
        currentPage = pageId;
        document.querySelectorAll("#navBar a").forEach(a => a.classList.remove("active"));
        if(pageId === "dashboard") document.getElementById("navDashboard")?.classList.add("active");
        else if(pageId === "treaty") document.getElementById("navTreaty")?.classList.add("active");
        else if(pageId === "cookout") document.getElementById("navCookout")?.classList.add("active");
        const contentDiv = document.getElementById("dashboardContent");
        if(pageId === "dashboard") renderDashboardByRole();
        else if(pageId === "treaty") renderTreatyPage(contentDiv);
        else if(pageId === "cookout") {
            let isHost = (currentUser && currentUser.role === "leader" && currentUser.gang === currentHost);
            renderCookoutPage(contentDiv, isHost);
        }
    }

    async function login(username, password) {
        const loginBtn = document.getElementById("loginBtn");
        const originalText = loginBtn.innerText;
        loginBtn.innerHTML = 'AUTHENTICATING <span class="loading"></span>';
        loginBtn.disabled = true;
        document.getElementById("loginStatus").innerHTML = "";

        const payload = { action: "login", username, password };
        try {
            const res = await fetchWithTimeout(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.success) {
                const mappedRole = roleMap[result.role] || result.role;
                currentUser = {
                    username: username,
                    role: mappedRole,
                    gang: result.gang,
                    password: password
                };
                const loaded = await loadFullData();
                if (loaded) {
                    document.getElementById("loginPanel").style.display = "none";
                    document.getElementById("dashboard").style.display = "block";
                    document.getElementById("userRoleBadge").innerText = currentUser.role.toUpperCase();
                    let nav = document.getElementById("navBar");
                    nav.innerHTML = "";
                    let pages = ["Dashboard", "Treaty", "Cookout"];
                    pages.forEach(p => {
                        let a = document.createElement("a");
                        a.innerText = p;
                        a.id = `nav${p}`;
                        a.onclick = () => setPage(p.toLowerCase());
                        nav.appendChild(a);
                    });
                    setPage("dashboard");
                } else {
                    document.getElementById("loginStatus").innerHTML = "<span style='color:#f00;'>Failed to load data. Check console.</span>";
                }
            } else {
                document.getElementById("loginStatus").innerHTML = "<span style='color:#f00;'>Invalid credentials.</span>";
            }
        } catch (err) {
            console.error("Login error:", err);
            document.getElementById("loginStatus").innerHTML = "<span style='color:#f00;'>Network error. Check API URL.</span>";
        } finally {
            loginBtn.innerHTML = originalText;
            loginBtn.disabled = false;
        }
    }

    function logout() {
        currentUser = null;
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("loginPanel").style.display = "block";
        document.getElementById("publicWarRoom").style.display = "none";
        closeModal();
    }

    function showPublicWarRoom() {
        closeModal();
        document.getElementById("loginPanel").style.display = "none";
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("publicWarRoom").style.display = "block";
        renderPublicWarRoom();
        setInterval(renderPublicWarRoom, 5000);
    }
    function hidePublicWarRoom() {
        document.getElementById("publicWarRoom").style.display = "none";
        document.getElementById("loginPanel").style.display = "block";
    }

    document.addEventListener("DOMContentLoaded", function() {
        const loginBtn = document.getElementById("loginBtn");
        if (loginBtn) loginBtn.onclick = () => {
            const user = document.getElementById("username").value.trim();
            const pwd = document.get
            const pwd = document.getElementById("password").value;
            login(user, pwd);
        };

        const publicLink = document.getElementById("publicWarRoomLink");
        if (publicLink) publicLink.onclick = showPublicWarRoom;

        const backBtn = document.getElementById("backToLoginFromPublic");
        if (backBtn) backBtn.onclick = hidePublicWarRoom;

        const logoutBtn = document.getElementById("logoutBtn");
        if (logoutBtn) logoutBtn.onclick = logout;
    });

    // Matrix background
    const canvas = document.getElementById("matrix-bg");
    const ctx = canvas.getContext("2d");
    let width = window.innerWidth, height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    const chars = "01";
    const fontSize = 16;
    const columns = width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0,0,0,0.05)";
        ctx.fillRect(0,0,width,height);
        ctx.fillStyle = "#0f0";
        ctx.font = `${fontSize}px monospace`;
        for(let i=0;i<drops.length;i++) {
            const text = chars.charAt(Math.floor(Math.random()*chars.length));
            ctx.fillText(text, i*fontSize, drops[i]*fontSize);
            if(drops[i]*fontSize > height && Math.random()>0.975) drops[i]=0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);
    window.addEventListener("resize",()=>{ width=window.innerWidth; height=window.innerHeight; canvas.width=width; canvas.height=height; });
    loadLocalData();
</script>
